<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENITH — Gestion de projets UX</title>
<style>
/* ═══════════════════════════════════════════════════
   ZENITH · Design System FAN
   Fabrique de l'Adoption Numérique
═══════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* === Couleurs structurelles === */
  --primaire: #001b44;
  --primaire-conteneur: #123062;
  --sur-primaire: #ffffff;
  --sur-primaire-conteneur: #d1e0f0;

  /* === Surfaces (mode clair) === */
  --surface: #f7f9ff;
  --surface-basse: #f1f4fa;
  --surface-haute: #dfe3e8;
  --surface-flottante: #ffffff;
  --sur-surface: #181c20;
  --sur-surface-secondaire: #44474e;

  /* === Accents fonctionnels === */
  --cerulean: #0088cc;
  --ambre: #eed484;
  --menthe: #00b388;
  --lavande: #8374d1;
  --ocre: #dc582a;
  --bourgogne: #651c32;
  --bleu-horizon: #a4c8e1;

  /* === Fonctionnels === */
  --succes-fond: #d3e9e5;
  --ombre-ambiante: rgba(0, 26, 66, 0.06);
  --bordure-fantome: rgba(116, 119, 128, 0.15);

  /* === Typographie === */
  --police-display: 'Avenir', 'Avenir Next', sans-serif;
  --police-corps: 'Avenir', 'Avenir Next', Arial, sans-serif;

  /* === Layout === */
  --sidebar-w: 240px;
  --ease: 150ms ease-out;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--police-corps);
  font-size: 14px;
  line-height: 1.65;
  color: var(--sur-surface);
  background: var(--surface);
  font-weight: 300;
}
h1, h2 {
  font-family: var(--police-display);
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--primaire);
}
h3 { font-family: var(--police-corps); font-weight: 400; }
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface-basse);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sb-head {
  padding: 20px 16px 16px;
  background: var(--primaire);
}
.sb-logo {
  font-family: var(--police-display);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--sur-primaire);
}
.sb-tagline {
  font-size: 10px;
  font-weight: 300;
  color: var(--sur-primaire-conteneur);
  letter-spacing: 0.03em;
  margin-top: 3px;
}
.sb-search { padding: 10px 12px; }
.sb-search input {
  width: 100%;
  font-family: var(--police-corps);
  font-size: 12px;
  font-weight: 400;
  background: var(--surface-haute);
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0.25rem 0.25rem 0 0;
  padding: 6px 10px;
  color: var(--sur-surface);
  outline: none;
  transition: background 0.2s, border-color 0.2s;
}
.sb-search input:focus {
  background: var(--surface-flottante);
  border-bottom-color: var(--primaire);
}
.sb-search input::placeholder { color: var(--sur-surface-secondaire); font-weight: 300; }
.sb-section {
  padding: 12px 14px 6px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--sur-surface-secondaire);
  font-weight: 500;
}
#project-list { flex: 1; overflow-y: auto; padding: 2px 0; }
.proj-item {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 400;
  color: var(--sur-surface-secondaire);
  transition: background var(--ease), color var(--ease);
  border-left: 2px solid transparent;
  user-select: none;
  gap: 6px;
}
.proj-item:hover { background: var(--surface-haute); color: var(--sur-surface); }
.proj-item.active {
  color: var(--primaire);
  font-weight: 500;
  border-left-color: var(--cerulean);
  background: rgba(0, 136, 204, 0.08);
}
.proj-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-item-progress { font-size: 10px; color: var(--cerulean); font-weight: 500; flex-shrink: 0; }
.sb-footer {
  padding: 12px 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sb-footer button {
  font-family: var(--police-corps);
  font-size: 12px;
  font-weight: 400;
  padding: 5px 0;
  text-align: left;
  background: none;
  border: none;
  color: var(--sur-surface-secondaire);
  cursor: pointer;
  transition: color var(--ease);
  display: flex;
  align-items: center;
  gap: 6px;
}
.sb-footer button:hover { color: var(--sur-surface); }
.sb-footer .btn-new { color: var(--cerulean); font-weight: 500; }
.sb-footer-fan {
  font-size: 9px;
  font-weight: 300;
  color: var(--sur-surface-secondaire);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-top: 10px;
}

/* ── MAIN ── */
#main { flex: 1; overflow-y: auto; height: 100vh; }

/* ── LANDING ── */
.landing {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 48px;
  text-align: center;
}
.landing-eyebrow {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cerulean);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.landing h1 { font-size: clamp(1.8rem, 3vw, 2.6rem); margin-bottom: 12px; }
.landing p {
  font-size: 14px;
  color: var(--sur-surface-secondaire);
  max-width: 380px;
  line-height: 1.65;
  margin-bottom: 28px;
  font-weight: 300;
}
.landing-action button {
  font-family: var(--police-corps);
  font-size: 14px;
  padding: 10px 24px;
  border: none;
  border-radius: 0.375rem;
  background: var(--primaire);
  color: var(--sur-primaire);
  cursor: pointer;
  font-weight: 500;
  transition: background 0.2s, transform 0.15s;
}
.landing-action button:hover { background: var(--primaire-conteneur); }
.landing-action button:active { transform: scale(0.98); }

/* Point vivant */
.point-vivant {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cerulean);
  animation: pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── PROJECT HEADER ── */
.proj-header { padding: 28px 40px 20px; background: var(--surface-flottante); }
.proj-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.proj-title {
  font-family: var(--police-display);
  font-size: 21px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--primaire);
}
.proj-type { font-size: 12px; color: var(--sur-surface-secondaire); font-weight: 400; }
.proj-actions { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.progress-wrap { margin-top: 4px; }
.progress-label { font-size: 11px; color: var(--sur-surface-secondaire); font-weight: 400; margin-bottom: 6px; letter-spacing: 0.02em; }
.progress-bar { height: 3px; background: var(--surface-haute); border-radius: 2px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cerulean), var(--menthe));
  border-radius: 2px;
  transition: width 300ms ease-out;
}

/* ── BREADCRUMB ── */
.breadcrumb {
  padding: 13px 40px;
  background: var(--surface-flottante);
  font-size: 12px;
  color: var(--sur-surface-secondaire);
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 400;
}
.breadcrumb a { color: var(--cerulean); text-decoration: none; cursor: pointer; transition: color var(--ease); }
.breadcrumb a:hover { color: var(--primaire); text-decoration: underline; text-underline-offset: 2px; }
.bc-sep { color: var(--sur-surface-secondaire); }

/* ── PHASES GRID ── */
.phases-grid {
  padding: 24px 40px 32px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  background: var(--surface);
}
.phase-card {
  background: var(--surface-flottante);
  border-radius: 0.25rem;
  padding: 20px;
  cursor: pointer;
  transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
  border-top: 3px solid transparent;
}
.phase-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px var(--ombre-ambiante);
}
/* Couleurs de phase (catégorisation chromatique FAN) */
.phase-card[data-phase="discovery"] { border-top-color: var(--cerulean); }
.phase-card[data-phase="research"]  { border-top-color: var(--menthe); }
.phase-card[data-phase="ideation"]  { border-top-color: var(--lavande); }
.phase-card[data-phase="design"]    { border-top-color: var(--ambre); }
.phase-card[data-phase="testing"]   { border-top-color: var(--ocre); }
.phase-card[data-phase="handoff"]   { border-top-color: var(--bourgogne); }

.pc-num {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--sur-surface-secondaire);
  font-weight: 500;
  margin-bottom: 8px;
}
.pc-title {
  font-family: var(--police-display);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--primaire);
  margin-bottom: 5px;
}
.pc-desc { font-size: 12px; color: var(--sur-surface-secondaire); line-height: 1.5; margin-bottom: 16px; font-weight: 300; }
.pc-footer { display: flex; justify-content: space-between; align-items: center; }
.pc-status { font-size: 11px; color: var(--sur-surface-secondaire); font-weight: 400; }
.pc-status.done { color: var(--menthe); font-weight: 500; }
.pc-status.inprogress { color: var(--cerulean); font-weight: 500; }
.pc-count { font-size: 11px; color: var(--cerulean); font-weight: 400; }

/* ── PHASE VIEW ── */
.phase-head { padding: 28px 40px 22px; background: var(--surface-flottante); }
.phase-head-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.ph-left .ph-num {
  font-size: 11px;
  color: var(--sur-surface-secondaire);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 6px;
}
.ph-left .ph-title {
  font-family: var(--police-display);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--primaire);
}
.status-sel {
  font-family: var(--police-corps);
  font-size: 12px;
  font-weight: 400;
  background: var(--surface-haute);
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0.25rem 0.25rem 0 0;
  padding: 6px 10px;
  color: var(--sur-surface);
  cursor: pointer;
  outline: none;
  transition: background 0.2s, border-color 0.2s;
}
.status-sel:focus { background: var(--surface-flottante); border-bottom-color: var(--primaire); }
.field-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--sur-surface-secondaire);
  font-weight: 500;
  display: block;
  margin-bottom: 8px;
}
.field-ta {
  width: 100%;
  font-family: var(--police-corps);
  font-size: 13px;
  font-weight: 300;
  line-height: 1.65;
  background: var(--surface-haute);
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0.25rem 0.25rem 0 0;
  padding: 10px 12px;
  color: var(--sur-surface);
  resize: vertical;
  outline: none;
  min-height: 72px;
  transition: background 0.2s, border-color 0.2s;
}
.field-ta:focus { background: var(--surface-flottante); border-bottom-color: var(--primaire); }
.field-ta::placeholder { color: var(--sur-surface-secondaire); font-weight: 300; }
.phase-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── DELIVERABLES ── */
.deliv-section { padding: 0 40px 48px; background: var(--surface); }
.deliv-header-row {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--sur-surface-secondaire);
  padding: 22px 0 14px;
  font-weight: 500;
}
.deliv { padding: 20px 0; border-bottom: 1px solid var(--bordure-fantome); }
.deliv:last-child { border-bottom: none; }
.deliv-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 12px; }
.deliv-info .deliv-title {
  font-family: var(--police-display);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--primaire);
  margin-bottom: 3px;
}
.deliv-info .deliv-desc { font-size: 12px; color: var(--sur-surface-secondaire); font-weight: 300; }
.deliv-btns { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.deliv-output {
  width: 100%;
  font-family: var(--police-corps);
  font-size: 13px;
  font-weight: 300;
  line-height: 1.7;
  background: var(--surface-haute);
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0.25rem 0.25rem 0 0;
  padding: 12px 14px;
  color: var(--sur-surface);
  resize: vertical;
  outline: none;
  min-height: 110px;
  transition: background 0.2s, border-color 0.2s;
}
.deliv-output:focus { background: var(--surface-flottante); border-bottom-color: var(--primaire); }
.deliv-output::placeholder { color: var(--sur-surface-secondaire); font-weight: 300; }
.deliv-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.deliv-ts { font-size: 11px; color: var(--sur-surface-secondaire); font-weight: 300; }
.deliv-copy-regen { display: flex; gap: 8px; }

/* ── BUTTONS ── */
.btn {
  font-family: var(--police-corps);
  font-size: 12px;
  padding: 7px 14px;
  border-radius: 0.375rem;
  cursor: pointer;
  font-weight: 400;
  line-height: 1;
  border: none;
  transition: background 0.2s, transform 0.15s;
}
.btn-primary { background: var(--primaire); color: var(--sur-primaire); }
.btn-primary:hover { background: var(--primaire-conteneur); }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary { background: var(--surface-haute); color: var(--sur-surface); }
.btn-secondary:hover { background: var(--surface-basse); color: var(--primaire); }
.btn-ghost {
  background: none;
  border: none;
  color: var(--cerulean);
  font-family: var(--police-corps);
  font-size: 12px;
  font-weight: 400;
  cursor: pointer;
  padding: 0;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}
.btn-ghost:hover { border-bottom-color: var(--cerulean); }
.btn-danger-outline {
  font-family: var(--police-corps);
  font-size: 12px;
  padding: 7px 14px;
  border: none;
  color: var(--ocre);
  border-radius: 0.375rem;
  cursor: pointer;
  background: none;
  font-weight: 400;
  transition: background 0.2s;
}
.btn-danger-outline:hover { background: rgba(220, 88, 42, 0.08); }

/* ── LOADING ── */
.loading-wrap { padding: 14px 0; display: flex; align-items: center; gap: 8px; color: var(--sur-surface-secondaire); font-size: 12px; font-weight: 300; }
.dots { display: inline-flex; gap: 3px; }
.dots span { width: 4px; height: 4px; background: var(--cerulean); border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* ── SYNTHESIS ── */
.synth-head { padding: 28px 40px 22px; background: var(--surface-flottante); display: flex; justify-content: space-between; align-items: flex-start; }
.synth-head-left h2 { font-size: 20px; }
.synth-head-left p { font-size: 13px; color: var(--sur-surface-secondaire); margin-top: 4px; font-weight: 300; }
.synth-actions { display: flex; gap: 10px; }
.synth-body { padding: 24px 40px 48px; }
.synth-phase { margin-bottom: 36px; }
.synth-phase-title {
  font-family: var(--police-display);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--primaire);
  padding: 10px 0;
  border-bottom: 1px solid var(--bordure-fantome);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.synth-phase-num { font-size: 10px; color: var(--sur-surface-secondaire); text-transform: uppercase; letter-spacing: .06em; font-weight: 500; font-family: var(--police-corps); }
.synth-deliv { margin-bottom: 20px; }
.synth-deliv-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--sur-surface-secondaire);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 6px;
  cursor: pointer;
  display: inline-block;
  font-family: var(--police-corps);
  transition: color var(--ease);
}
.synth-deliv-title:hover { color: var(--cerulean); }
.synth-deliv-text {
  font-size: 13px;
  line-height: 1.65;
  color: var(--sur-surface);
  white-space: pre-wrap;
  border-left: 2px solid var(--cerulean);
  padding-left: 14px;
  max-height: 220px;
  overflow: hidden;
  position: relative;
  font-weight: 300;
}
.synth-deliv-text.expanded { max-height: none; }
.synth-expand {
  font-size: 11px;
  color: var(--cerulean);
  cursor: pointer;
  margin-top: 4px;
  background: none;
  border: none;
  font-family: var(--police-corps);
  font-weight: 400;
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
  transition: color var(--ease);
}
.synth-expand:hover { color: var(--primaire); }
.synth-empty { color: var(--sur-surface-secondaire); font-size: 13px; font-weight: 300; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0, 27, 68, 0.45); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadein .15s ease-out; }
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface-flottante);
  border-radius: 0.25rem;
  padding: 28px;
  min-width: 380px;
  max-width: 460px;
  box-shadow: 0 24px 60px rgba(0, 26, 66, 0.18);
  animation: slideup .15s ease-out;
}
.modal-title {
  font-family: var(--police-display);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--primaire);
  margin-bottom: 20px;
}
.form-field { margin-bottom: 14px; }
.form-label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--sur-surface-secondaire);
  font-weight: 500;
  font-family: var(--police-corps);
  display: block;
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  font-family: var(--police-corps);
  font-size: 14px;
  font-weight: 400;
  background: var(--surface-haute);
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0.25rem 0.25rem 0 0;
  padding: 9px 12px;
  color: var(--sur-surface);
  outline: none;
  transition: background 0.2s, border-color 0.2s;
}
.form-input:focus { background: var(--surface); border-bottom-color: var(--primaire); }
.form-input::placeholder { color: var(--sur-surface-secondaire); font-weight: 300; }
.form-hint { font-size: 11px; color: var(--sur-surface-secondaire); margin-top: 5px; font-weight: 300; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
.modal-sep { height: 1px; background: var(--surface-haute); margin: 18px 0; }

/* ── TOAST ── */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--primaire);
  color: var(--sur-primaire);
  font-size: 13px;
  font-family: var(--police-corps);
  font-weight: 400;
  padding: 10px 18px;
  border-radius: 0.25rem;
  animation: slideup .15s ease-out;
  white-space: nowrap;
  box-shadow: 0 8px 24px var(--ombre-ambiante);
}
.toast.out { animation: fadeout .3s ease-out forwards; }

/* ── EMPTY STATE ── */
.empty-deliv { padding: 14px 0; font-size: 13px; color: var(--sur-surface-secondaire); font-weight: 300; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-haute); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--bleu-horizon); }

/* ── ANIMATIONS ── */
@keyframes fadein { from{opacity:0} to{opacity:1} }
@keyframes slideup { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeout { to{opacity:0;transform:translateY(3px)} }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  #app { flex-direction: column; height: auto; overflow: auto; }

function getPrevContext(project, currentPhaseId) {
  const idx = PHASE_ORDER.indexOf(currentPhaseId);
  if (idx <= 0) return '';
  let parts = [];
  for (let i = 0; i < idx; i++) {
    const phKey = PHASE_ORDER[i];
    const ph = project.phases[phKey];
    if (!ph) continue;
    const phConf = PHASES_CONFIG[phKey];
    const delivs = Object.entries(ph.deliverables || {})
      .filter(([,d]) => d && d.content)
      .map(([k,d]) => `### ${phConf.deliverables[k]?.label || k}\n${d.content}`)
      .join('\n\n');
    if (delivs) parts.push(`## Phase ${phConf.number} — ${phConf.label}\n\n${delivs}`);
  }
  return parts.length ? '\n\n---\nLivrables des phases précédentes :\n\n' + parts.join('\n\n') : '';
}

function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() :
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
    });
}

function emptyPhase() { return {status:'todo',context:'',notes:'',deliverables:{}}; }

function createProject(name, type='') {
  const now = new Date().toISOString();
  const p = {
    id: uuid(), name, type, createdAt: now, updatedAt: now,
    phases: {}
  };
  PHASE_ORDER.forEach(k => { p.phases[k] = emptyPhase(); });
  S.projects.unshift(p);
  saveProjects();
  return p;
}

function getProject(id) { return S.projects.find(p => p.id === id); }

function updateProject(id, fn) {
  const p = getProject(id);
  if (!p) return;
  fn(p);
  p.updatedAt = new Date().toISOString();
  saveProjects();
}

function deleteProject(id) {
  S.projects = S.projects.filter(p => p.id !== id);
  saveProjects();
}

function countDone(project) {
  return PHASE_ORDER.filter(k => project.phases[k]?.status === 'done').length;
}

function countDeliverables(project, phaseId) {
  const phase = project.phases[phaseId];
  if (!phase) return [0,0];
  const conf = PHASES_CONFIG[phaseId];
  const total = Object.keys(conf.deliverables).length;
  const done = Object.values(phase.deliverables || {}).filter(d => d && d.content).length;
  return [done, total];
}

async function generateDeliverable(projectId, phaseId, delivId) {
  if (!S.apiKey) { showSettings(); toast('Configurez votre clé API dans les réglages'); return; }
  const project = getProject(projectId);
  if (!project) return;
  const phase = project.phases[phaseId];
  const phConf = PHASES_CONFIG[phaseId];
  const delivConf = phConf.deliverables[delivId];
  const loadKey = `${phaseId}.${delivId}`;

  S.loading[loadKey] = true;
  renderDeliverable(projectId, phaseId, delivId);

  const prompt = buildPrompt(phaseId, delivId, project, phase);
  if (!prompt) { S.loading[loadKey] = false; renderDeliverable(projectId, phaseId, delivId); return; }

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: delivConf.maxTokens,
        temperature: 0.7,
        system: prompt.system,
        messages: [{ role: 'user', content: prompt.user }]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
    const content = data.content?.[0]?.text || '';
    updateProject(projectId, p => {
      if (!p.phases[phaseId].deliverables[delivId]) p.phases[phaseId].deliverables[delivId] = {};
      p.phases[phaseId].deliverables[delivId].content = content;
      p.phases[phaseId].deliverables[delivId].generatedAt = new Date().toISOString();
    });
    toast('Livrable généré');
  } catch(e) {
    toast('Erreur : ' + e.message);
  } finally {
    S.loading[loadKey] = false;
    renderDeliverable(projectId, phaseId, delivId);
    renderSidebarProjects();
  }
}

    <div class="synth-body">${phaseSections}</div>`;
}

// ════════════════════════════════════════════════════════════
// MODALS
// ════════════════════════════════════════════════════════════

function showModal(html) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  // Fermeture uniquement si clic sur l'overlay lui-même (géré dans le handler global)
  const firstInput = overlay.querySelector('input,textarea');
  if (firstInput) firstInput.focus();
}
function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function showNewProject() {
  showModal(`<div class="modal-title">Nouveau projet</div>
    <div class="form-field">
      <label class="form-label">Nom du projet</label>
      <input class="form-input" id="new-proj-name" type="text" placeholder="Ex : Refonte espace client" autocomplete="off">
    </div>
    <div class="form-field">
      <label class="form-label">Type de produit <span style="font-weight:400;text-transform:none;letter-spacing:0">(optionnel)</span></label>
      <input class="form-input" id="new-proj-type" type="text" placeholder="Application mobile, Web SaaS, Portail intranet…">
      <div class="form-hint">Aide l'IA à contextualiser les livrables.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-action="close-modal">Annuler</button>
      <button class="btn btn-primary" data-action="confirm-new-project">Créer le projet</button>
    </div>`);
  document.getElementById('new-proj-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.querySelector('[data-action="confirm-new-project"]').click();
  });
}

function showRename(id) {
  const p = getProject(id);
  if (!p) return;
  showModal(`<div class="modal-title">Renommer le projet</div>
    <div class="form-field">
      <label class="form-label">Nom</label>
      <input class="form-input" id="rename-name" type="text" value="${esc(p.name)}">
    </div>
    <div class="form-field">
      <label class="form-label">Type de produit</label>
      <input class="form-input" id="rename-type" type="text" value="${esc(p.type || '')}" placeholder="Application mobile, Web SaaS…">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-action="close-modal">Annuler</button>
      <button class="btn btn-primary" data-action="confirm-rename" data-id="${id}">Enregistrer</button>
    </div>`);
}

function showDeleteConfirm(id) {
  const p = getProject(id);
  if (!p) return;
  showModal(`<div class="modal-title">Supprimer le projet ?</div>
    <p style="font-size:14px;color:var(--fg-muted);margin-bottom:8px">Le projet <strong>${esc(p.name)}</strong> et tous ses livrables seront supprimés définitivement.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-action="close-modal">Annuler</button>
      <button class="btn-danger-outline" data-action="confirm-delete" data-id="${id}">Supprimer</button>
    </div>`);
}

function showSettings() {
  showModal(`<div class="modal-title">Réglages</div>
    <div class="form-field">
      <label class="form-label">Clé API Anthropic</label>
      <input class="form-input" id="api-key-input" type="password" value="${esc(S.apiKey)}" placeholder="sk-ant-…" autocomplete="off">
      <div class="form-hint">Stockée localement dans votre navigateur. Jamais envoyée à un tiers.</div>
    </div>
    <div class="modal-sep"></div>
    <div style="font-size:12px;color:var(--fg-subtle)">
      Modèle : ${MODEL}<br>
      Données : stockées dans localStorage du navigateur
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-action="close-modal">Fermer</button>
      <button class="btn btn-primary" data-action="save-api-key">Enregistrer</button>
    </div>`);
}

// ════════════════════════════════════════════════════════════
// IMPORT / EXPORT
// ════════════════════════════════════════════════════════════

function exportProject(id) {
  const p = getProject(id);
  if (!p) return;
  const blob = new Blob([JSON.stringify(p, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${p.name.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Projet exporté');
}

function importProject(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.name || !data.phases) throw new Error('Format invalide');
      data.id = uuid();
      data.name = data.name + ' (importé)';
      data.createdAt = new Date().toISOString();
      data.updatedAt = new Date().toISOString();
      // Ensure all phases exist
      PHASE_ORDER.forEach(k => { if (!data.phases[k]) data.phases[k] = emptyPhase(); });
      S.projects.unshift(data);
      saveProjects();
      S.currentId = data.id;
      S.currentPhase = null;
      renderAll();
      toast('Projet importé');
    } catch(err) {
      toast('Erreur import : ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  try {
    return new Intl.DateTimeFormat('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(iso));
  } catch { return iso; }
}

let _toastTimer;
function toast(msg) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => el.remove(), 320);
  }, 2500);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copié !')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Copié !');
  });
}

// Debounced save for textareas
const _debouncers = {};
function debouncedSaveField(key, fn, delay=600) {
  clearTimeout(_debouncers[key]);
  _debouncers[key] = setTimeout(fn, delay);
}

// ════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) {
    // Click outside modal closes it
    if (e.target.id === 'modal-overlay') hideModal();
    return;
  }
  const action = el.dataset.action;
  const id = el.dataset.id;
  const phase = el.dataset.phase;
  const deliv = el.dataset.deliv;

  if (action === 'select-project') {
    S.currentId = id; S.currentPhase = null; renderAll();
  } else if (action === 'new-project') {
    showNewProject();
  } else if (action === 'confirm-new-project') {
    const name = document.getElementById('new-proj-name')?.value?.trim();
    const type = document.getElementById('new-proj-type')?.value?.trim();
    if (!name) { document.getElementById('new-proj-name').focus(); return; }
    const p = createProject(name, type);
    S.currentId = p.id; S.currentPhase = null;
    hideModal(); renderAll();
    toast('Projet créé');
  } else if (action === 'rename-project') {
    showRename(id);
  } else if (action === 'confirm-rename') {
    const name = document.getElementById('rename-name')?.value?.trim();
    const type = document.getElementById('rename-type')?.value?.trim();
    if (!name) return;
    updateProject(id, p => { p.name = name; p.type = type || ''; });
    hideModal(); renderAll();
  } else if (action === 'delete-project') {
    showDeleteConfirm(id);
  } else if (action === 'confirm-delete') {
    deleteProject(id);
    if (S.currentId === id) { S.currentId = null; S.currentPhase = null; }
    hideModal(); renderAll();
    toast('Projet supprimé');
  } else if (action === 'view-phase') {
    S.currentId = id; S.currentPhase = phase; renderMain();
  } else if (action === 'back-to-overview') {
    S.currentId = id; S.currentPhase = null; renderMain();
  } else if (action === 'view-synthesis') {
    S.currentId = id; S.currentPhase = 'synthesis'; renderMain();
  } else if (action === 'nav-to-deliverable') {
    S.currentPhase = phase; renderMain();
    setTimeout(() => {
      const el2 = document.getElementById(`deliv-${phase}-${deliv}`);
      if (el2) el2.scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  } else if (action === 'generate-deliverable') {
    generateDeliverable(id, phase, deliv);
  } else if (action === 'copy-deliverable') {
    const ta = document.querySelector(`textarea[data-action="save-deliverable"][data-phase="${phase}"][data-deliv="${deliv}"]`);
    if (ta) copyText(ta.value);
  } else if (action === 'import-project') {
    document.getElementById('import-file')?.click();
  } else if (action === 'export-project') {
    exportProject(id || S.currentId);
  } else if (action === 'open-settings') {
    showSettings();
  } else if (action === 'save-api-key') {
    const k = document.getElementById('api-key-input')?.value?.trim();
    saveApiKey(k || '');
    hideModal();
    toast('Clé API enregistrée');
  } else if (action === 'close-modal') {
    hideModal();
  } else if (action === 'print-synthesis') {
    window.print();
  } else if (action === 'expand-synth') {
    const txtEl = document.getElementById(`synth-text-${phase}-${deliv}`);
    if (txtEl) {
      txtEl.classList.toggle('expanded');
      el.textContent = txtEl.classList.contains('expanded') ? 'Voir moins' : 'Voir plus';
    }
  }
});

// Textarea auto-save with debounce
document.addEventListener('input', e => {
  const el = e.target;
  const action = el.dataset.action;
  if (!action) return;
  const id = el.dataset.id;
  const phase = el.dataset.phase;
  const deliv = el.dataset.deliv;

  if (action === 'save-context') {
    debouncedSaveField(`ctx-${id}-${phase}`, () => {
      updateProject(id, p => { p.phases[phase].context = el.value; });
    });
  } else if (action === 'save-notes') {
    debouncedSaveField(`notes-${id}-${phase}`, () => {
      updateProject(id, p => { p.phases[phase].notes = el.value; });
    });
  } else if (action === 'save-deliverable') {
    debouncedSaveField(`deliv-${id}-${phase}-${deliv}`, () => {
      updateProject(id, p => {
        if (!p.phases[phase].deliverables[deliv]) p.phases[phase].deliverables[deliv] = {};
        p.phases[phase].deliverables[deliv].content = el.value;
      });
      renderSidebarProjects();
    });
  }
});

// File import + status select
document.addEventListener('change', e => {
  if (e.target.id === 'import-file') {
    importProject(e.target.files[0]);
    e.target.value = '';
  } else if (e.target.dataset.action === 'change-status') {
    const sel = e.target;
    updateProject(sel.dataset.id, p => { p.phases[sel.dataset.phase].status = sel.value; });
    renderSidebarProjects();
  }
});

        <div class="form-field">

          <input class="form-input" id="api-key-input" type="password" placeholder="sk-ant-…" autocomplete="off">

        <div class="modal-actions">
          <button class="btn btn-secondary" data-action="close-modal">Plus tard</button>
          <button class="btn btn-primary" data-action="save-api-key">Enregistrer</button>
        </div>`);

  }
}

document.addEventListener('DOMContentLoaded', init);
